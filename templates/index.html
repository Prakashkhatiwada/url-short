<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnipURL — short links, no fluff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:#f4f5f7;
            min-height:100vh;
            color:#1a1a2e;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:24px
        }
        .card{
            max-width:720px;
            width:100%;
            background:#fff;
            border-radius:20px;
            box-shadow:0 2px 12px rgba(0,0,0,.06);
            padding:36px 32px
        }
        .logo{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:28px
        }
        .logo-icon{
            width:40px;height:40px;
            background:#1a1a2e;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:20px;
            font-weight:700;
            font-family:'Inter',sans-serif
        }
        .logo h1{
            font-size:22px;
            font-weight:700;
            letter-spacing:-.3px
        }
        .input-row{
            display:flex;
            gap:10px;
            margin-bottom:20px
        }
        .input-row input{
            flex:1;
            padding:14px 18px;
            font-size:15px;
            border:2px solid #e2e2ea;
            border-radius:12px;
            background:#fafafa;
            color:#1a1a2e;
            font-family:'Inter',sans-serif;
            transition:border-color .2s,box-shadow .2s
        }
        .input-row input:focus{
            outline:none;
            border-color:#1a1a2e;
            box-shadow:0 0 0 3px rgba(26,26,46,.08)
        }
        .input-row input::placeholder{color:#9e9eae}
        .input-row button{
            padding:14px 24px;
            font-size:15px;
            font-weight:600;
            color:#fff;
            background:#1a1a2e;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-family:'Inter',sans-serif;
            white-space:nowrap;
            transition:background .2s
        }
        .input-row button:hover{background:#2d2d4a}
        .input-row button:disabled{opacity:.5;cursor:not-allowed}
        .error{
            display:none;
            padding:12px 16px;
            background:#fef2f2;
            border:1px solid #fecaca;
            border-radius:10px;
            color:#b91c1c;
            font-size:14px;
            margin-bottom:16px;
            align-items:center;
            gap:8px
        }
        .error.show{display:flex}
        .result{
            display:none;
            margin-bottom:28px;
            padding:16px 18px;
            background:#f0fdf4;
            border:1px solid #bbf7d0;
            border-radius:12px
        }
        .result.show{display:block}
        .result-label{
            font-size:13px;
            font-weight:600;
            color:#16a34a;
            margin-bottom:8px
        }
        .result-url{
            display:flex;
            align-items:center;
            gap:10px
        }
        .result-url a{
            flex:1;
            font-size:17px;
            font-weight:600;
            color:#2563eb;
            text-decoration:none;
            word-break:break-all
        }
        .result-url a:hover{text-decoration:underline}
        .result-url button{
            padding:10px 18px;
            font-size:13px;
            font-weight:600;
            color:#fff;
            background:#16a34a;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-family:'Inter',sans-serif;
            white-space:nowrap;
            transition:background .2s
        }
        .result-url button:hover{background:#15803d}
        .result-url button.copied{background:#2563eb}
        .section-header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:16px
        }
        .section-header h2{
            font-size:17px;
            font-weight:600
        }
        .section-header span{
            background:#e8e8f0;
            color:#1a1a2e;
            padding:2px 10px;
            border-radius:20px;
            font-size:13px;
            font-weight:600
        }
        .list{display:flex;flex-direction:column;gap:10px}
        .list-item{
            background:#fafafa;
            border:1px solid #e8e8f0;
            border-radius:12px;
            padding:16px 18px;
            transition:border-color .2s
        }
        .list-item:hover{border-color:#c8c8d8}
        .item-top{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:6px
        }
        .item-top a{
            font-size:15px;
            font-weight:600;
            color:#2563eb;
            text-decoration:none
        }
        .item-top a:hover{text-decoration:underline}
        .item-actions{display:flex;gap:6px}
        .item-actions button{
            width:34px;height:34px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            transition:background .2s
        }
        .item-actions .copy-btn{
            background:#e8f8ef;
            color:#16a34a
        }
        .item-actions .copy-btn:hover{background:#d0f0dd}
        .item-actions .del-btn{
            background:#fee8e8;
            color:#dc2626
        }
        .item-actions .del-btn:hover{background:#fcd0d0}
        .item-original{
            font-size:13px;
            color:#6b6b80;
            word-break:break-all;
            margin-bottom:8px
        }
        .item-meta{
            display:flex;
            gap:18px;
            font-size:12px;
            color:#8e8ea0
        }
        .item-meta span{display:flex;align-items:center;gap:5px}
        .empty{
            text-align:center;
            padding:36px 20px;
            color:#8e8ea0;
            font-size:14px
        }
        .empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
        .toast{
            position:fixed;
            bottom:24px;
            left:50%;
            transform:translateX(-50%) translateY(80px);
            background:#1a1a2e;
            color:#fff;
            padding:12px 22px;
            border-radius:10px;
            font-size:14px;
            box-shadow:0 4px 16px rgba(0,0,0,.15);
            transition:transform .3s;
            z-index:999;
            pointer-events:none
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        @media(max-width:600px){
            body{padding:16px}
            .card{padding:24px 18px}
            .input-row{flex-direction:column}
            .input-row button{justify-content:center}
            .result-url{flex-direction:column;align-items:flex-start}
            .item-top{flex-direction:column;align-items:flex-start;gap:8px}
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">S</div>
            <h1>SnipURL</h1>
        </div>
        <div class="error" id="errorMessage">
            <span id="errorText">Error</span>
        </div>
        <div class="input-row">
            <input type="url" id="urlInput" placeholder="Paste a long URL..." autocomplete="off">
            <button id="shortenBtn">Snip it</button>
        </div>
        <div class="result" id="resultSection">
            <div class="result-label">Done!</div>
            <div class="result-url">
                <a href="#" id="shortUrl" target="_blank"></a>
                <button id="copyBtn">Copy</button>
            </div>
        </div>
        <div class="section-header">
            <h2>Your links</h2>
            <span id="urlCount">0</span>
        </div>
        <div class="list" id="urlsList">
            <div class="empty">
                <div class="empty-icon">| |</div>
                <p>No links yet. Paste one above.</p>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const API_BASE='';
        document.addEventListener('DOMContentLoaded',loadUrls);
        document.getElementById('urlInput').addEventListener('keypress',function(e){if(e.key==='Enter')shortenUrl()});
        document.getElementById('shortenBtn').addEventListener('click',shortenUrl);

        function fallbackCopy(text){
            const ta=document.createElement('textarea');
            ta.value=text;
            ta.style.position='fixed';ta.style.opacity='0';
            document.body.appendChild(ta);
            ta.select();
            try{document.execCommand('copy')}catch(e){}
            document.body.removeChild(ta);
        }

        async function shortenUrl(){
            const inp=document.getElementById('urlInput');
            const btn=document.getElementById('shortenBtn');
            const res=document.getElementById('resultSection');
            const err=document.getElementById('errorMessage');
            const url=inp.value.trim();
            res.classList.remove('show');
            err.classList.remove('show');
            if(!url){showError('Enter a URL');return}
            btn.disabled=true;btn.textContent='Working...';
            try{
                const r=await fetch(API_BASE+'/api/shorten',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
                const d=await r.json();
                if(!r.ok)throw new Error(d.error||'Failed');
                document.getElementById('shortUrl').textContent=d.short_url;
                document.getElementById('shortUrl').href=d.short_url;
                res.classList.add('show');
                const cb=document.getElementById('copyBtn');
                cb.classList.remove('copied');cb.textContent='Copy';
                inp.value='';
                loadUrls();
            }catch(e){showError(e.message)}
            finally{btn.disabled=false;btn.textContent='Snip it'}
        }
        async function loadUrls(){
            try{
                const r=await fetch(API_BASE+'/api/urls');
                const d=await r.json();
                const list=document.getElementById('urlsList');
                document.getElementById('urlCount').textContent=d.urls.length;
                if(!d.urls.length){list.innerHTML='<div class="empty"><div class="empty-icon">| |</div><p>No links yet. Paste one above.</p></div>';return}
                list.innerHTML=d.urls.map(u=>`
                    <div class="list-item" id="u-${u.short_code}">
                        <div class="item-top">
                            <a href="${u.short_url}" target="_blank">${u.short_url}</a>
                            <div class="item-actions">
                                <button class="copy-btn" onclick="copyUrl('${u.short_url}')">C</button>
                                <button class="del-btn" onclick="deleteUrl('${u.short_code}')">X</button>
                            </div>
                        </div>
                        <div class="item-original">${u.original_url}</div>
                        <div class="item-meta">
                            <span>${u.click_count} clicks</span>
                            <span>${formatDate(u.created_at)}</span>
                        </div>
                    </div>
                `).join('');
            }catch(e){console.error(e)}
        }
        async function deleteUrl(code){
            if(!confirm('Delete this link?'))return;
            try{
                const r=await fetch(API_BASE+'/api/delete/'+code,{method:'DELETE'});
                if(r.ok){loadUrls();showToast('Deleted')}
            }catch(e){showError('Could not delete')}
        }
        function copyToClipboard(){
            const url=document.getElementById('shortUrl').textContent;
            copyUrl(url);
            const btn=document.getElementById('copyBtn');
            btn.classList.add('copied');btn.textContent='Copied!';
        }
        function copyUrl(url){
            if(navigator.clipboard&&navigator.clipboard.writeText)
                navigator.clipboard.writeText(url).then(()=>showToast('Copied!')).catch(()=>{fallbackCopy(url);showToast('Copied!')});
            else{fallbackCopy(url);showToast('Copied!')}
        }
        function showError(m){
            const e=document.getElementById('errorMessage');
            document.getElementById('errorText').textContent=m;
            e.classList.add('show')
        }
        function showToast(m){
            const t=document.getElementById('toast');
            t.textContent=m;
            t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'),2500)
        }
        function formatDate(d){
            return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        }
    </script>
</body>
</html>
