<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — gone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:#f4f5f7;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#1a1a2e;
            padding:24px
        }
        .card{
            text-align:center;
            background:#fff;
            border-radius:20px;
            box-shadow:0 2px 12px rgba(0,0,0,.06);
            padding:48px 40px;
            max-width:420px;
            width:100%
        }
        .code{
            font-size:100px;
            font-weight:800;
            color:#1a1a2e;
            line-height:1;
            margin-bottom:12px
        }
        h1{
            font-size:24px;
            font-weight:700;
            margin-bottom:8px
        }
        p{
            color:#6b6b80;
            font-size:15px;
            margin-bottom:28px
        }
        .btn{
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:14px 28px;
            background:#1a1a2e;
            color:#fff;
            text-decoration:none;
            border-radius:10px;
            font-weight:600;
            font-size:14px;
            transition:background .2s;
            font-family:'Inter',sans-serif
        }
        .btn:hover{background:#2d2d4a}
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <h1>Link not found</h1>
        <p>This short URL doesn't exist or has been deleted.</p>
        <a href="/" class="btn">Go home</a>
    </div>
</body>
</html>
